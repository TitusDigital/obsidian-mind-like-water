name: Feature Request
description: Suggest an enhancement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow gap or frustration.
      placeholder: "I want to filter my Next Actions by due date, but the filter chips only support energy and context."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your ideal solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you've tried.

  - type: dropdown
    id: area
    attributes:
      label: Area of the plugin
      options:
        - Sidebar views (Focus, Next Actions, Scheduled, etc.)
        - Metadata editor
        - Recurring tasks
        - Projects
        - Filter chips
        - Inline chips / editor
        - Quick capture
        - Weekly review
        - Settings
        - Import / export
        - Other
    validations:
      required: true
